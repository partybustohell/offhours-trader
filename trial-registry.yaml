# Typed trial registry — the machine-readable source of truth for the quant
# testing plan (docs/QUANT-TESTING-PLAN.md). Every ALPHA-signal test is
# pre-registered here BEFORE its results are read. Two gates enforce it:
# `pnpm preflight` refuses to start if an ENABLED alpha flag has no type:alpha
# row whose `flag` matches exactly, and `backtest.ts sweep` refuses to run a
# search whose flags have no type:alpha coverage (`flag` or `flags` list).
# Both gates additionally require the covering row to carry a `mechanism`
# statement (below) before it authorizes NEW work.
#
# Field semantics:
#   date   = registration date (when the row was written), NOT the data window.
#   window = data window evaluated, e.g. "2026-01-01..2026-07-01".
#   cells  = evaluated config cells the row covers (default 1). nTrials for the
#            deflated-Sharpe multiple-testing gate = sum of `cells` over
#            type:alpha rows. Counting is PER CELL: every priced evaluation of
#            a config cell on the window counts, including re-runs under
#            changed harness/gate settings and runs later judged invalid
#            (over-counting only raises the DSR benchmark; under-counting is
#            the failure mode).
#   flags  = additional flags a campaign row covers. Registers BACKTEST SEARCH
#            only; enabling a signal LIVE requires a dedicated row whose `flag`
#            is that signal's config path.
#   mechanism = REQUIRED for a row to authorize NEW work (a live enable or a
#            new backtest search). Three sentences, each >= 5 words:
#              counterparty: who is on the other side of the trade
#              whyTheyPay:   why they systematically lose or pay
#              friction:     what stops professionals from closing it
#            If these cannot be written down, the idea is parameter-fishing
#            and must not enter the registry. Legacy rows without a mechanism
#            still count toward nTrials (history is history) but no longer
#            authorize new sweeps or enables — the gates refuse them.
#
# To test a signal: add a row { flag: <config path>, type: alpha, status:
# pre-registered, mechanism, enabledDate, horizonDays, targetActiveN } BEFORE
# enabling it. To run a backtest search: add (or bump `cells` on) a campaign
# row WITH a mechanism BEFORE reading results. Post-hoc registrations are a
# rule violation — mark them.
