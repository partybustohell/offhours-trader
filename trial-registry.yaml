  - id: earnings-underreaction-smallcap
    date: "2026-07-10"
    flag: signals.event_reaction
    type: alpha
    status: pre-registered
    horizonDays: 180
    targetActiveN: 50
    mechanism:
      counterparty: >-
        Holders of thin small-cap names who sell into the first hours after a
        positive earnings surprise: retail profit-takers anchored to the
        pre-announcement price, plus index and ETF flows that trade on
        schedule rather than on the news content.
      whyTheyPay: >-
        Anchoring makes them treat the old price as fair value and exit too
        early, so the new information is absorbed over days instead of
        minutes — the documented post-earnings-announcement drift, strongest
        where analyst coverage is thin.
      friction: >-
        The names are too small for institutional capacity: a desk that must
        deploy millions moves the price against itself before the edge pays,
        and thin sell-side coverage means nobody is paid to close the gap
        quickly.
    notes: >-
      Registered at DESIGN STAGE (2026-07-10): the signals.event_reaction
      machinery does not exist yet and nothing has been evaluated — this row
      states the hypothesis and its mechanism before any code or search.
      Predicted locus (pre-registered subgroup): small, thinly covered names;
      an effect concentrated in large caps falsifies the friction sentence
      even at positive P&L. Set enabledDate when the implementation lands
      (before any result is read); any backtest search against this flag
      requires bumping cells here or appending a campaign row first.
  - id: insider-cluster-smallcap
    date: "2026-07-13"
    flag: signals.insider_cluster
    type: alpha
    status: pre-registered
    horizonDays: 180
    targetActiveN: 50
    mechanism:
      counterparty: >-
        Slow-to-update holders of small, thinly covered names who do not
        reprice when a corporate insider makes an unscheduled, information-
        driven open-market purchase and discloses it on an SEC Form 4.
      whyTheyPay: >-
        Opportunistic insiders buy on genuine private information the market
        absorbs over months, while most Form 4 buys are routine calendar-
        pattern trades carrying no signal, so the crowd underweights the
        informative subset and updates too slowly.
      friction: >-
        The signal is buried and must be separated from routine trades by
        classifying each insider's multi-year filing history, and the effect
        concentrates in names too small and illiquid for institutional desks
        to size into.
    notes: >-
      Registered at DESIGN STAGE (2026-07-13): the signals.insider_cluster
      machinery does not exist yet and nothing has been evaluated — this row
      states the hypothesis and its mechanism before any code or search.
      Source: Cohen, Malloy & Pomorski (2012), "Decoding Inside Information,"
      J. Finance 67(3):1009-1043 — opportunistic long-short 82 bps/mo VW
      (t=2.15), routine subset ~zero. GROSS, in-sample 1989-2007, treat as a
      PRE-DECAY UPPER BOUND: Wintoki (2016) puts the alpha in the earlier
      subperiod and Jacobs & Müller (2020) find US anomalies lose ~60% post-
      publication. Predicted locus (pre-registered subgroup): small, thinly
      covered names entered on opportunistic CLUSTER buys, long-only — small-
      cap borrow >30%/yr makes the short side uncapturable. Falsifiers: an
      effect concentrated in large caps falsifies the friction sentence; an
      effect equal across routine and opportunistic trades falsifies whyTheyPay,
      even at positive P&L. Data: free SEC EDGAR Form 4 feed. Correlated with
      earnings-underreaction-smallcap and revision-drift-lowcoverage (same
      universe, same limits-to-arbitrage) — NOT an independent bet; test as one
      thesis with three triggers. Set enabledDate when the implementation lands
      (before any result is read); any backtest search against this flag
      requires bumping cells here or appending a campaign row first.
  - id: revision-drift-lowcoverage
    date: "2026-07-13"
    flag: signals.revision_drift
    type: alpha
    status: pre-registered
    horizonDays: 90
    targetActiveN: 50
    mechanism:
      counterparty: >-
        Holders of thinly covered small caps who do not reprice when a lone
        sell-side analyst issues a forecast revision that moves away from the
        prevailing consensus estimate.
      whyTheyPay: >-
        With few analysts on the name a revision diffuses slowly instead of
        being arbitraged within minutes, so the crowd stays anchored to the
        stale consensus and updates over weeks rather than at once.
      friction: >-
        Low analyst coverage is itself the limit to arbitrage — nobody is paid
        to close the gap quickly — and the names are too small and wide-spread
        for institutions to harvest at size.
    notes: >-
      Registered at DESIGN STAGE (2026-07-13): the signals.revision_drift
      machinery does not exist yet and nothing has been evaluated — this row
      states the hypothesis and its mechanism before any code or search.
      Source: Gleason & Lee (2003), "Analyst Forecast Revisions and Market
      Price Discovery," The Accounting Review 78(1):193-225 — price adjustment
      is slower and less complete for low-coverage firms; drift concentrates in
      away-from-consensus ("high-innovation") revisions. GROSS, mid-1990s data,
      PRE-DECAY UPPER BOUND (earnings-revision momentum attenuated post-2000;
      Jacobs & Müller 2020 US post-publication decay). Predicted locus (pre-
      registered subgroup): low-coverage small caps, entry on away-from-
      consensus revisions only, hold weeks-to-a-quarter, long-only. Falsifiers:
      an effect concentrated in high-coverage names falsifies the friction
      sentence; an effect equal for herding and away-from-consensus revisions
      falsifies whyTheyPay. Data: paid estimate/revision feed required (the cost
      of the signal). Correlated with earnings-underreaction-smallcap and
      insider-cluster-smallcap (same universe) — NOT an independent bet. Set
      enabledDate when the implementation lands (before any result is read);
      any backtest search against this flag requires bumping cells here or
      appending a campaign row first.
