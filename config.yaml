mode: paper
live_trading_acknowledged: false
universe:
  nominations_per_agent: 5
  max_candidates: 15
  min_price: 5
  min_avg_dollar_volume: 20000000
  exclude: []
sessions:
  premarket: true
  afterhours: true
agent_weights:
  fundamental: 1
  technical: 0.8
  macro: 0.6
  sentiment: 1
  bear: 1.2
# 0.55 chosen from the Jan-Jun 2026 backtest sweep: under directional
# normalization the score distribution tops out near 0.65 (1 trade/50 days);
# 0.55 trades ~7 per 50 sampled days with all downstream gates active. No
# positive edge is established at any threshold — paper soak is the test.
conviction_threshold: 0.55
quorum: 3
min_agreeing: 2
max_position_pct: 5
max_daily_deploy_pct: 10
max_order_notional_usd: 2000
max_spread_bps: 50
max_chase_pct: 1
max_drop_pct: 3
daily_loss_halt_pct: 3
executor_interval_min: 15
thesis_run_time_et: 17:00
model:
  analysts: claude-sonnet-5
  synthesizer: claude-opus-4-8
  executor: claude-sonnet-5
