mode: paper
live_trading_acknowledged: false
universe:
  nominations_per_agent: 5
  max_candidates: 15
  min_price: 5
  min_avg_dollar_volume: 20000000
  exclude: []
sessions:
  premarket: false      # off-hours trading disabled 2026-07-09
  afterhours: false     # off-hours trading disabled 2026-07-09
  regularhours: true    # regular session 09:30-16:00; opt-in, works on free IEX feed
agent_weights:
  fundamental: 1
  technical: 0.8
  macro: 0.6
  sentiment: 1
  bear: 1.2
# 0.55 chosen from the Jan-Jun 2026 backtest sweep: under directional
# normalization the score distribution tops out near 0.65 (1 trade/50 days);
# 0.55 trades ~7 per 50 sampled days with all downstream gates active. No
# positive edge is established at any threshold — paper soak is the test.
conviction_threshold: 0.55
quorum: 3
min_agreeing: 2
max_position_pct: 5
max_daily_deploy_pct: 10
# Deploy-budget ordering + concentration (deterministic sizing discipline).
# The executor funds thesis entries in array order until the deploy cap binds,
# so ordering decides which names get funded first.
deploy_priority: conviction    # conviction | conviction_per_risk (÷ realized vol)
min_position_notional_usd: 250 # drop sub-floor positions (whole-share dust).
                               # NOTE: sizing base = min(order cap, equity·pos%);
                               # at equity < ~$5k this floor silently drops
                               # marginal entries — lower it for small accounts.
max_open_names: 5              # cap entries per thesis, best-conviction first.
                               # Raised to 5 for the seeded starter basket.
                               # Coherent: 5 × max_position_pct 5% = 25% =
                               # max_gross_exposure_pct, so the name cap is
                               # actually reachable (not shadowed by gross).
# Cross-day exposure backstops (entries only), above the per-day deploy cap.
# gross = total book ceiling (= max_open_names full-size names). Raised to hold
# the ~$20k (20% of equity) starter basket with a little headroom; net == gross
# so an all-long basket isn't blocked by a tighter directional cap.
max_gross_exposure_pct: 25
max_net_exposure_pct: 25
# Entries-only intraday timing blackout (wall-clock; feed-independent; exits
# are never gated). Avoids the RTH open/close spikes and the deep-premarket /
# late-afterhours liquidity vacuum.
entry_blackout:
  rth_open_min: 10             # skip the first N min of RTH (09:30–09:40)
  rth_close_min: 10            # skip the last N min before the close (15:50–16:00)
  premarket_start_hm: "08:00"  # no premarket entries before this ET time
  afterhours_end_hm: "18:00"   # no afterhours entries at/after this ET time
target_vol_pct: 40          # risk-parity sizing reference (annualized vol %)
max_position_loss_pct: 8    # per-position hard stop, checked each tick
max_order_notional_usd: 2000
max_spread_bps: 50
data_feed: iex          # iex (free, blind in deep off-hours) | sip (paid, required for real extended-hours trading)
max_quote_age_sec: 120  # reject quotes older than this — fail closed, never trade a stale book
max_chase_pct: 1
max_drop_pct: 3
daily_loss_halt_pct: 3
executor_interval_min: 15
thesis_run_time_et: 17:00
# Backtest/report governance only (no trading effect): the report refuses an
# economic PASS/FAIL verdict below this many headline-stratum trades.
min_trades_for_economic_claim: 50

# ---- P1–P3 quant signals: ALL ship flag-OFF and their full schema + defaults
# live in src/config.ts (ConfigSchema) so they need not be repeated here. Do NOT
# enable any until the paper soak has >=50 out-of-sample closed trades. Each is a
# down-only size multiplier, a fail-closed gate, or an ordering tweak; none is a
# directional vote. Groups: signals.* (anti_chase, amihud, dispersion, trend_gate,
# gap, low_vol), regime.* (trend, vol, gross), portfolio.* (sizing_mode,
# target_vol, cov_*), execution.* (cost_scalar, participation, entry_aggressiveness,
# gates_by_session — SIP-only), risk_overlay.* (drawdown_throttle, risk_off),
# calibration.*, and signal_scalar_floor. See docs/superpowers/specs. Example:
# signals:
#   anti_chase: { enabled: true }   # override just the fields you want ----
model:
  analysts: claude-sonnet-5
  synthesizer: claude-opus-4-8
  executor: claude-sonnet-5
